  <script type="text/babel">
    const { useState, useEffect } = React;



// ─── MILESTONES ───────────────────────────────────────────────────────────────
const MILESTONES_INIT = [
  { id:"gym",      name:"Gym New Card",           yearlyBudget:12000000, installments:[{month:"2026-03",planned:6000000},{month:"2026-04",planned:6000000}], paid:0, note:"Mar 6M + Apr 6M" },
  { id:"b1",       name:"Car License B1",          yearlyBudget:13000000, installments:[{month:"2026-03",planned:3000000},{month:"2026-04",planned:5000000},{month:"2026-05",planned:5000000}], paid:0, note:"Mar 3M · Apr 5M · May 5M" },
  { id:"capm",     name:"CAPM Certification",      yearlyBudget:10000000, installments:[{month:"2026-07",planned:10000000}], paid:0, note:"Full payment July" },
  { id:"localtrip",name:"Local Trip",              yearlyBudget:7000000,  installments:[{month:"2026-04",planned:3500000},{month:"2026-05",planned:3500000}], paid:0, note:"Apr or May" },
  { id:"neartrip", name:"Near Local Trip",          yearlyBudget:7000000,  installments:[{month:"2026-03",planned:2000000},{month:"2026-04",planned:2000000},{month:"2026-05",planned:3000000}], paid:0, note:"First trip Mar ~2M" },
  { id:"carreg",   name:"Car Purchase (supporting)",yearlyBudget:50000000, installments:[{month:"2026-04",planned:10000000}], paid:0, note:"Apr 10M registration · 40M buffer later" },
  { id:"overseas", name:"Overseas Trip",            yearlyBudget:20000000, installments:[{month:"2026-09",planned:20000000}], paid:0, note:"September" },
  { id:"gold",     name:"Gold Investment",          yearlyBudget:100000000,installments:[], paid:0, note:"Buy when Wallet 2 ≥ 20M" },
  { id:"personal", name:"Personal Project",         yearlyBudget:10000000, installments:[{month:"2026-04",planned:5000000},{month:"2026-07",planned:5000000}], paid:0, note:"Apr 5M · Jul 5M" },
];

const NEEDS_DEFAULT = [
  { id:"mum",       label:"Family support (Mum)", amount:5000000 },
  { id:"grab",      label:"Transport (Grab)",      amount:400000 },
  { id:"streaming", label:"Streaming",             amount:200000 },
  { id:"groceries", label:"Groceries",             amount:500000 },
];

const MONTHS = ["2026-03","2026-04","2026-05","2026-06","2026-07","2026-08","2026-09","2026-10","2026-11","2026-12"];
const MN     = m => ({"2026-03":"Mar","2026-04":"Apr","2026-05":"May","2026-06":"Jun","2026-07":"Jul","2026-08":"Aug","2026-09":"Sep","2026-10":"Oct","2026-11":"Nov","2026-12":"Dec"})[m]||m;
const MN_FULL= m => ({"2026-03":"March","2026-04":"April","2026-05":"May","2026-06":"June","2026-07":"July","2026-08":"August","2026-09":"September","2026-10":"October","2026-11":"November","2026-12":"December"})[m]||m;
const NOW_M  = () => { const d=new Date(),k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; return MONTHS.includes(k)?k:"2026-03"; };

const BCFG = {
  Needs:  {color:"#3b82f6",light:"#eff6ff",border:"#bfdbfe",text:"#1d4ed8",emoji:"🏠"},
  Buffer: {color:"#f59e0b",light:"#fffbeb",border:"#fde68a",text:"#b45309",emoji:"🛡️"},
  Wants:  {color:"#8b5cf6",light:"#f5f3ff",border:"#ddd6fe",text:"#6d28d9",emoji:"✨"},
};

const initData = () => ({
  wallet2Balance: 0,
  milestones: MILESTONES_INIT,
  months: {},
  wallet2Txs: [],  // {id, date, month, type:"credit"|"payment"|"transfer", amount, note, milestoneId?}
});

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const fmtM = n => { if(!n&&n!==0)return"—"; const a=Math.abs(n),s=n<0?"-":""; return a>=1e6?s+(a/1e6).toFixed(1).replace(/\.0$/,"")+"M":a>=1000?s+Math.round(a/1e3)+"K":String(n); };
const pct  = (a,b) => b>0?Math.min(100,Math.round(a/b*100)):0;
const today = () => new Date().toLocaleDateString("en-GB");

const getPlanned = (milestones, month) =>
  milestones.map(m=>{const i=m.installments.find(x=>x.month===month);return i?{...m,thisMonth:i.planned}:null;}).filter(Boolean);

const suggestAlloc = (wiz, milestones) => {
  const e = Number(wiz.earning)||26000000;
  // Committed events → Needs
  let committed = 0;
  const committedList = [];
  (wiz.birthdays||[]).forEach(b=>{const a=(b.type==="family"?700000:200000)*Number(b.count||1);committed+=a;committedList.push({label:b.type==="family"?`Birthday - Family x${b.count}`:`Birthday - Colleague x${b.count}`,amount:a});});
  (wiz.weddings||[]).forEach(w=>{const a=(w.type==="bestfriend"?1500000:w.type==="colleague_close"?500000:300000)*Number(w.count||1);committed+=a;committedList.push({label:w.type==="bestfriend"?`Wedding - Best friend x${w.count}`:w.type==="colleague_close"?`Wedding - Close colleague x${w.count}`:`Wedding - Casual x${w.count}`,amount:a});});
  if (wiz.extraFamily) { committed+=Number(wiz.extraFamily); committedList.push({label:"Extra family obligation",amount:Number(wiz.extraFamily)}); }

  const needsFixed = wiz.needsItems.reduce((s,i)=>s+Number(i.amount||0),0);
  const customNeedsTotal = (wiz.customNeeds||[]).reduce((s,i)=>s+Number(i.amount||0),0);
  const needsTotal = needsFixed + customNeedsTotal + committed;
  const bufferAmt  = Math.round(e * (Number(wiz.bufferPct||8)/100));
  const savingsPct = Number(wiz.savingsPct||40);
  const savingsAmt = Math.round(e * savingsPct/100);
  const wantsAmt   = Math.max(0, e - needsTotal - bufferAmt - savingsAmt);

  // Milestone check
  const planned     = getPlanned(milestones, wiz.month);
  const milestoneDue= planned.reduce((s,m)=>s+m.thisMonth,0);
  const warnings    = [];
  if (milestoneDue > savingsAmt) {
    warnings.push({type:"critical", msg:`Milestone payments (${fmtM(milestoneDue)}) exceed Savings bucket (${fmtM(savingsAmt)}). Consider increasing Savings % or pushing a payment deadline.`});
  } else if (savingsPct < 40) {
    warnings.push({type:"warn", msg:`Savings at ${savingsPct}% — below 40% target. Try to keep it above 40% when possible.`});
  }
  if (wantsAmt < e*0.15) warnings.push({type:"warn", msg:`Only ${fmtM(wantsAmt)} for Wants this month — will feel tight.`});
  if (committed > 0)      warnings.push({type:"info", msg:`${fmtM(committed)} in committed events added to Fixed Needs.`});
  if (milestoneDue > 0 && milestoneDue <= savingsAmt) warnings.push({type:"info", msg:`${fmtM(milestoneDue)} in milestone payments scheduled — will be tracked in Wallet 2.`});

  return { needs:needsTotal, buffer:bufferAmt, wants:wantsAmt, savings:savingsAmt, earning:e, needsFixed, committed, committedList, milestoneDue, planned, savingsPct, warnings };
};

const buildTimeline = (milestones, months, w2Balance, earning, savingsPct=40) => {
  let running = w2Balance;
  return MONTHS.map(m=>{
    const planned = getPlanned(milestones, m);
    const due     = planned.reduce((s,p)=>s+p.thisMonth,0);
    const credit  = Math.round(earning * savingsPct/100);
    running       = Math.max(0, running + credit - due);
    return {month:m, due, credit, running, planned, hasData:!!months[m], tight: running < 10000000 && due > 0};
  });
};

// ─── COMPONENTS ───────────────────────────────────────────────────────────────
const Bar = ({value,max,color,h=7}) => (
  <div style={{height:h,background:"#f1f5f9",borderRadius:h/2,overflow:"hidden"}}>
    <div style={{height:"100%",width:`${Math.min(pct(value,max),100)}%`,background:value>max?"#ef4444":color,borderRadius:h/2,transition:"width 0.4s"}}/>
  </div>
);

const Pill = ({color,bg,children}) => <span style={{fontSize:10,fontWeight:700,color,background:bg,borderRadius:4,padding:"2px 7px"}}>{children}</span>;

const WarnBox = ({type,msg}) => {
  const cfg = type==="critical"?{bg:"#fef2f2",bd:"#fca5a5",tc:"#dc2626"}:type==="warn"?{bg:"#fffbeb",bd:"#fde68a",tc:"#b45309"}:{bg:"#eff6ff",bd:"#bfdbfe",tc:"#1d4ed8"};
  return <div style={{background:cfg.bg,border:`1px solid ${cfg.bd}`,borderRadius:10,padding:"9px 12px",marginBottom:10}}><p style={{fontSize:12,color:cfg.tc,margin:0}}>{msg}</p></div>;
};

// ─── MAIN ─────────────────────────────────────────────────────────────────────
function MoneyOS() {
  const [tab,    setTab]     = useState("home");
  const [d,      setD]       = useState(null);
  const [loading,setLoading] = useState(true);
  const [curMonth,setCurMonth]= useState(NOW_M());

  // Wizard
  const [step,   setStep]    = useState(1);
  const [wiz,    setWiz]     = useState({month:NOW_M(),earning:26000000,savingsPct:40,bufferPct:8,needsItems:NEEDS_DEFAULT.map(x=>({...x})),customNeeds:[{label:"",amount:""},{label:"",amount:""}],extraFamily:0,birthdays:[],weddings:[]});
  const [alloc,  setAlloc]   = useState(null);
  const [postSetup,setPostSetup] = useState(null);

  // Wallet 1 tx modal
  const [showTx, setShowTx]  = useState(false);
  const [tx,     setTx]      = useState({amount:"",bucket:"Wants",description:"",joy:""});

  // Wallet 2 tx modal
  const [showW2, setShowW2]  = useState(false);
  const [w2tx,   setW2tx]    = useState({type:"payment",amount:"",milestoneId:"",note:""});

  // Milestone modal (quick pay from roadmap)
  const [mModal, setMModal]  = useState(null);
  const [mPay,   setMPay]    = useState("");

  // Reset modal
  const [showReset, setShowReset] = useState(false);
  const [resetMonth, setResetMonth]= useState(NOW_M());

  // Joy evaluator
  const [joy,    setJoy]     = useState({name:"",amount:"",jScore:3,rScore:3});
  const [scenarioIncome, setScenarioIncome] = useState(26000000);

  // End of month transfer
  const [showTransfer,setShowTransfer] = useState(false);
  const [transferAmt, setTransferAmt]  = useState("");

  useEffect(()=>{load();},[]);
  const load = async () => {
    try{const raw=localStorage.getItem("amyOS_v5");setD(raw?JSON.parse(raw):initData());}
    catch{setD(initData());}
    setLoading(false);
  };
  const save = async nd=>{setD(nd);try{localStorage.setItem("amyOS_v5",JSON.stringify(nd));}catch{}};

  // ── Confirm month setup ───────────────────────────────────────────────────
  const confirmMonth = async () => {
    if (!alloc) return;
    const monthData = {
      earning: alloc.earning, savingsPct: alloc.savingsPct,
      allocation: {needs:alloc.needs,buffer:alloc.buffer,wants:alloc.wants,savings:alloc.savings},
      needsItems: wiz.needsItems, committedList: alloc.committedList,
      milestoneDue: alloc.milestoneDue, planned: alloc.planned,
      transactions: [], archived: false,
    };
    // Auto-credit Wallet 2 with savings amount
    const creditTx = {id:Date.now(),date:today(),month:wiz.month,type:"credit",amount:alloc.savings,note:`Savings credit — ${MN_FULL(wiz.month)}`};
    const newW2Balance = d.wallet2Balance + alloc.savings;
    const nd = {...d, wallet2Balance:newW2Balance, months:{...d.months,[wiz.month]:monthData}, wallet2Txs:[...d.wallet2Txs, creditTx]};
    await save(nd);
    setCurMonth(wiz.month);
    // Next month projection
    const nIdx = MONTHS.indexOf(wiz.month)+1;
    let proj = null;
    if (nIdx < MONTHS.length) {
      const nm = MONTHS[nIdx];
      const np = getPlanned(nd.milestones, nm);
      const nDue = np.reduce((s,p)=>s+p.thisMonth,0);
      const nSav = Math.round(alloc.earning * alloc.savingsPct/100);
      proj = {month:nm, milestoneDue:nDue, savingsCredit:nSav, projW2:newW2Balance+nSav-nDue, wantsEst:Math.max(0,alloc.earning-alloc.needs-alloc.buffer-nSav), planned:np};
    }
    setPostSetup({alloc, month:wiz.month, proj, newW2Balance});
    setStep(1);
  };

  // ── Wallet 1 transactions ─────────────────────────────────────────────────
  const addTx = async () => {
    if (!tx.amount||!tx.description) return;
    const md=d.months[curMonth]; if(!md) return;
    const newTx={id:Date.now(),amount:Number(tx.amount),bucket:tx.bucket,description:tx.description,joy:tx.joy?Number(tx.joy):null,date:today()};
    await save({...d,months:{...d.months,[curMonth]:{...md,transactions:[...(md.transactions||[]),newTx]}}});
    setTx({amount:"",bucket:"Wants",description:"",joy:""}); setShowTx(false);
  };
  const deleteTx = async id => {
    const md=d.months[curMonth]; if(!md) return;
    await save({...d,months:{...d.months,[curMonth]:{...md,transactions:md.transactions.filter(t=>t.id!==id)}}});
  };

  // ── Wallet 2 transactions ─────────────────────────────────────────────────
  const addW2Tx = async () => {
    if (!w2tx.amount) return;
    const amt = Number(w2tx.amount);
    const newTx = {id:Date.now(),date:today(),month:curMonth,type:w2tx.type,amount:amt,milestoneId:w2tx.milestoneId||null,note:w2tx.note};
    let newBalance = d.wallet2Balance;
    let updatedMilestones = d.milestones;
    if (w2tx.type==="payment") {
      newBalance = Math.max(0, d.wallet2Balance - amt);
      if (w2tx.milestoneId) {
        updatedMilestones = d.milestones.map(m=>m.id===w2tx.milestoneId?{...m,paid:m.paid+amt}:m);
      }
    } else {
      newBalance = d.wallet2Balance + amt;
    }
    await save({...d,wallet2Balance:newBalance,milestones:updatedMilestones,wallet2Txs:[...d.wallet2Txs,newTx]});
    setW2tx({type:"payment",amount:"",milestoneId:"",note:""}); setShowW2(false);
  };

  // ── End of month surplus transfer ─────────────────────────────────────────
  const doTransfer = async () => {
    if (!transferAmt) return;
    const amt = Number(transferAmt);
    const transferTx = {id:Date.now(),date:today(),month:curMonth,type:"transfer",amount:amt,note:`Surplus transfer from ${MN_FULL(curMonth)} budget`};
    const newBalance = d.wallet2Balance + amt;
    await save({...d,wallet2Balance:newBalance,wallet2Txs:[...d.wallet2Txs,transferTx]});
    setTransferAmt(""); setShowTransfer(false);
  };

  // ── Reset month ───────────────────────────────────────────────────────────
  const doReset = async () => {
    const md = d.months[resetMonth]; if(!md) return;
    // Archive: mark as archived, keep data
    const archived = {...md, archived:true, archivedAt:today()};
    // Reverse the savings credit that was auto-added
    const creditAmt = md.allocation?.savings||0;
    const newW2 = Math.max(0, d.wallet2Balance - creditAmt);
    const newW2Txs = d.wallet2Txs.filter(t=>!(t.month===resetMonth&&t.type==="credit"));
    const newMonths = {...d.months};
    delete newMonths[resetMonth];
    newMonths[`${resetMonth}_archived`] = archived;
    await save({...d,wallet2Balance:newW2,months:newMonths,wallet2Txs:newW2Txs});
    setShowReset(false);
  };

  // ── Milestone quick pay ───────────────────────────────────────────────────
  const payMilestone = async () => {
    if (!mModal||!mPay) return;
    const amt=Number(mPay);
    const newTx={id:Date.now(),date:today(),month:curMonth,type:"payment",amount:amt,milestoneId:mModal.id,note:`Payment: ${mModal.name}`};
    const newMs=d.milestones.map(m=>m.id===mModal.id?{...m,paid:m.paid+amt}:m);
    await save({...d,wallet2Balance:Math.max(0,d.wallet2Balance-amt),milestones:newMs,wallet2Txs:[...d.wallet2Txs,newTx]});
    setMModal(null); setMPay("");
  };

  // ── Export data as JSON backup ────────────────────────────────────────────
  const exportData = () => {
    const json = JSON.stringify(d, null, 2);
    const a = document.createElement("a");
    a.href = "data:application/json;charset=utf-8," + encodeURIComponent(json);
    a.download = `Amy_MoneyOS_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  };

  // ── Import JSON backup ────────────────────────────────────────────────────
  const importData = () => {
    const input = document.createElement("input");
    input.type = "file"; input.accept = ".json";
    input.onchange = e => {
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const parsed = JSON.parse(ev.target.result);
          if (!parsed.milestones || !parsed.months) { alert("Invalid backup file"); return; }
          localStorage.setItem("amyOS_v5", JSON.stringify(parsed));
          setD(parsed);
          alert("✅ Data imported successfully!");
        } catch { alert("Failed to parse backup file"); }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  // ── Export Excel ───────────────────────────────────────────────────────────
  const loadXLSX = () => new Promise((resolve, reject) => {
    if (window.XLSX) { resolve(window.XLSX); return; }
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload = () => resolve(window.XLSX);
    s.onerror = reject;
    document.head.appendChild(s);
  });

  const exportExcel = async () => {
    try {
      const XLSX = await loadXLSX();
      const wb = XLSX.utils.book_new();
      // Sheet 1: Wallet 1 Spending
      const w1rows=[["Date","Month","Bucket","Amount (đ)","Description","Joy Score"]];
      Object.entries(d.months).forEach(([m,md])=>{
        if (m.includes("archived")) return;
        (md.transactions||[]).forEach(t=>w1rows.push([t.date,MN_FULL(m),t.bucket,t.amount,t.description,t.joy||""]));
      });
      const ws1 = XLSX.utils.aoa_to_sheet(w1rows);
      ws1["!cols"] = [{wch:12},{wch:12},{wch:10},{wch:14},{wch:30},{wch:10}];
      XLSX.utils.book_append_sheet(wb, ws1, "Wallet 1 Spending");
      // Sheet 2: Wallet 2 Transactions
      const w2rows=[["Date","Month","Type","Amount (đ)","Milestone","Note"]];
      d.wallet2Txs.forEach(t=>{
        const ms=t.milestoneId?d.milestones.find(m=>m.id===t.milestoneId)?.name||t.milestoneId:"";
        w2rows.push([t.date,MN_FULL(t.month||""),t.type,t.amount,ms,t.note||""]);
      });
      const ws2 = XLSX.utils.aoa_to_sheet(w2rows);

  // ── Derived ───────────────────────────────────────────────────────────────
  const getSpent  = (month,bucket) => { const md=d?.months?.[month]; return md?.transactions?.filter(t=>t.bucket===bucket).reduce((s,t)=>s+t.amount,0)||0; };
  const curMD     = d?.months?.[curMonth];
  const jR        = () => {

    if (jScore<=3&&rScore>=4) return {icon:"❌",label:"Affordable but cut — won't make you happy",c:"#dc2626",bg:"#fef2f2"};

    btnP:{width:"100%",background:"#7c3aed",color:"#fff",border:"none",borderRadius:12,padding:"13px 16px",fontSize:13,fontWeight:700,cursor:"pointer"},

    btnGr:{width:"100%",background:"#059669",color:"#fff",border:"none",borderRadius:12,padding:"13px 16px",fontSize:13,fontWeight:700,cursor:"pointer"},
    btnRed:{background:"#fef2f2",border:"1px solid #fca5a5",color:"#dc2626",borderRadius:10,padding:"8px 14px",fontSize:12,cursor:"pointer",fontWeight:600},
    nav: {position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #e2e8f0",display:"flex",zIndex:100},

  };

  if (loading) return <div style={{...s.pg,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#94a3b8"}}>Loading...</span></div>;

  // ── POST SETUP PREVIEW ────────────────────────────────────────────────────
  if (postSetup) {

        {/* ══════ WEEKLY WANTS ══════ */}
        {tab==="weekly"&&(
          <div>
            {!curMD?(
              <div style={{...s.card(),textAlign:"center",padding:32}}>
                <div style={{fontSize:13,color:"#64748b",marginBottom:12}}>Set up {MN_FULL(curMonth)} first to see weekly tracking</div>
                <button style={{...s.btnP,width:"auto",padding:"10px 24px",display:"inline-block"}} onClick={()=>{setWiz({...wiz,month:curMonth});setStep(1);setTab("setup");}}>Setup {MN_FULL(curMonth)}</button>
              </div>
            ):(()=>{
              const wantsAlloc = curMD.allocation.wants;
              const weeklyQuota = Math.round(wantsAlloc/4);
              const txs = curMD.transactions||[];
              // Assign transactions to weeks by date (day 1-7=W1, 8-14=W2, 15-21=W3, 22+=W4)
              const getWeek = dateStr => {
                const parts = dateStr.split("/"); // en-GB: DD/MM/YYYY
                const day = parseInt(parts[0]||"1");
                return day<=7?0:day<=14?1:day<=21?2:3;
              };
              const weeks = [0,1,2,3].map(w=>{
                const wtxs = txs.filter(t=>t.bucket==="Wants"&&getWeek(t.date)===w);
                const spent = wtxs.reduce((s,t)=>s+t.amount,0);
                return {label:`Week ${w+1}`,spent,quota:weeklyQuota,txs:wtxs,over:spent>weeklyQuota};
              });
              const totalSpent = txs.filter(t=>t.bucket==="Wants").reduce((s,t)=>s+t.amount,0);
              const remaining = wantsAlloc - totalSpent;
              return (
                <div>
                  {/* Month summary */}
                  <div style={{background:"linear-gradient(135deg,#7c3aed,#a78bfa)",borderRadius:20,padding:"20px 18px",marginBottom:12,color:"#fff"}}>
                    <div style={{fontSize:11,opacity:0.8,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Wants Budget · {MN_FULL(curMonth)}</div>
                    <div style={{fontSize:38,fontWeight:900,letterSpacing:-2,lineHeight:1}}>{fmtM(remaining)}</div>
                    <div style={{fontSize:12,opacity:0.7,marginTop:6}}>remaining of {fmtM(wantsAlloc)} · {fmtM(weeklyQuota)}/week quota</div>
                    <div style={{marginTop:10}}><Bar value={totalSpent} max={wantsAlloc} color="rgba(255,255,255,0.85)" h={5}/></div>
                  </div>
                  {/* Weekly grid */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                    {weeks.map((w,i)=>(
                      <div key={i} style={{background:w.over?"#fef2f2":w.spent>0?"#f5f3ff":"#f8fafc",border:`1.5px solid ${w.over?"#fca5a5":w.spent>0?"#ddd6fe":"#e2e8f0"}`,borderRadius:14,padding:"12px 14px"}}>
                        <div style={{fontSize:11,fontWeight:700,color:w.over?"#dc2626":"#6d28d9",marginBottom:5}}>{w.label}</div>
                        <div style={{fontSize:20,fontWeight:900,color:w.over?"#dc2626":"#7c3aed"}}>{fmtM(w.spent)}</div>
                        <div style={{fontSize:10,color:"#94a3b8",marginBottom:6}}>of {fmtM(w.quota)} quota</div>
                        <Bar value={w.spent} max={w.quota} color={w.over?"#ef4444":"#8b5cf6"} h={4}/>
                        {w.over&&<div style={{fontSize:10,color:"#ef4444",marginTop:3,fontWeight:600}}>Over {fmtM(w.spent-w.quota)}</div>}
                        {!w.over&&w.spent>0&&<div style={{fontSize:10,color:"#94a3b8",marginTop:3}}>{fmtM(w.quota-w.spent)} left</div>}
                        {w.spent===0&&<div style={{fontSize:10,color:"#cbd5e1",marginTop:3}}>No spending yet</div>}
                      </div>
                    ))}
                  </div>
                  {/* Pace insight */}
                  {(()=>{
                    const now = new Date();
                    const dayOfMonth = now.getDate();
                    const weeksPassed = Math.ceil(dayOfMonth/7);
                    const expectedSpend = weeklyQuota * weeksPassed;
                    const diff = totalSpent - expectedSpend;
                    const onTrack = Math.abs(diff) < weeklyQuota * 0.2;
                    return (
                      <div style={s.card({background:onTrack?"#ecfdf5":diff>0?"#fef2f2":"#f0fdf4",border:`1.5px solid ${onTrack?"#a7f3d0":diff>0?"#fca5a5":"#a7f3d0"}`})}>
                        <div style={{fontSize:13,fontWeight:700,color:onTrack?"#065f46":diff>0?"#dc2626":"#065f46",marginBottom:4}}>
                          {onTrack?"✅ On track":"🔴 Running ahead — slow down"}
                        </div>
                        <div style={{fontSize:12,color:"#64748b"}}>
                          By day {dayOfMonth}, expected spend: {fmtM(expectedSpend)} · Actual: {fmtM(totalSpent)}
                          {!onTrack&&diff>0&&<span style={{color:"#dc2626"}}> (+{fmtM(diff)} ahead of pace)</span>}
                          {!onTrack&&diff<0&&<span style={{color:"#059669"}}> ({fmtM(Math.abs(diff))} under pace 🎉)</span>}
                        </div>
                      </div>
                    );
                  })()}
                  {/* Transaction breakdown by week */}
                  {weeks.filter(w=>w.txs.length>0).map((w,wi)=>(
                    <div key={wi} style={{...s.card(),padding:0,overflow:"hidden"}}>
                      <div style={{padding:"10px 16px",borderBottom:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:13,fontWeight:700}}>{w.label} transactions</span>
                        <span style={{fontSize:12,fontWeight:700,color:w.over?"#dc2626":"#7c3aed"}}>{fmtM(w.spent)}</span>
                      </div>
                      {w.txs.map(t=>(
                        <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 16px",borderBottom:"1px solid #f8fafc"}}>
                          <div>
                            <div style={{fontSize:12}}>{t.description}</div>
                            <div style={{fontSize:10,color:"#cbd5e1"}}>{t.date}{t.joy&&` · Joy ${t.joy}/5`}</div>
                          </div>
                          <span style={{fontSize:13,fontWeight:700}}>−{fmtM(t.amount)}</span>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              );
            })()}
          </div>
        )}

        {/* ══════ SCENARIO SIMULATOR ══════ */}
        {tab==="scenario"&&(
          <div>
            <div style={{background:"linear-gradient(135deg,#0f172a,#1e293b)",borderRadius:20,padding:"20px 18px",marginBottom:12,color:"#fff"}}>
              <div style={{fontSize:11,opacity:0.6,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Income Scenario Simulator</div>
              <div style={{fontSize:13,opacity:0.8,marginBottom:14}}>Adjust income to see how it affects your savings & Wants across all 10 months</div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <input type="range" min={18000000} max={40000000} step={500000} value={scenarioIncome}
                  onChange={e=>setScenarioIncome(Number(e.target.value))}
                  style={{flex:1,accentColor:"#a78bfa"}}/>
                <div style={{textAlign:"right",minWidth:60}}>
                  <div style={{fontSize:22,fontWeight:900,color:"#a78bfa"}}>{fmtM(scenarioIncome)}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:8,marginTop:10}}>
                {[18000000,22000000,26000000,30000000,35000000].map(v=>(
                  <button key={v} onClick={()=>setScenarioIncome(v)}
                    style={{background:scenarioIncome===v?"#7c3aed":"rgba(255,255,255,0.1)",border:`1px solid ${scenarioIncome===v?"#7c3aed":"rgba(255,255,255,0.2)"}`,color:"#fff",borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>
                    {fmtM(v)}
                  </button>
                ))}
              </div>
            </div>

            {/* Scenario allocation preview */}
            {(()=>{
              const e = scenarioIncome;
              const fixedNeeds = 6100000; // avg fixed needs
              const buffer = Math.round(e*0.08);
              const savings = Math.round(e*0.40);
              const wants = Math.max(0, e - fixedNeeds - buffer - savings);
              const weeklyWants = Math.round(wants/4);
              return (
                <div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                    {[
                      {label:"Fixed Needs",val:fixedNeeds,pct:Math.round(fixedNeeds/e*100),color:"#3b82f6",bg:"#eff6ff",bd:"#bfdbfe",tc:"#1d4ed8",note:"Locked in"},
                      {label:"Buffer (8%)",val:buffer,pct:8,color:"#f59e0b",bg:"#fffbeb",bd:"#fde68a",tc:"#b45309",note:"Unexpected only"},
                      {label:"Wants",val:wants,pct:Math.round(wants/e*100),color:"#8b5cf6",bg:"#f5f3ff",bd:"#ddd6fe",tc:"#6d28d9",note:`${fmtM(weeklyWants)}/week`},
                      {label:"Savings →W2",val:savings,pct:40,color:"#10b981",bg:"#ecfdf5",bd:"#a7f3d0",tc:"#065f46",note:"40% target"},
                    ].map((item,i)=>(
                      <div key={i} style={{background:item.bg,border:`1.5px solid ${item.bd}`,borderRadius:14,padding:"12px 14px"}}>
                        <div style={{fontSize:11,fontWeight:700,color:item.tc,marginBottom:4}}>{item.label}</div>
                        <div style={{fontSize:20,fontWeight:900,color:item.color}}>{fmtM(item.val)}</div>
                        <div style={{fontSize:10,color:"#94a3b8",marginBottom:6}}>{item.pct}% · {item.note}</div>
                        <Bar value={item.pct} max={100} color={item.color} h={4}/>
                      </div>
                    ))}
                  </div>
                  {wants < e*0.15 && (
                    <div style={{background:"#fef2f2",border:"1.5px solid #fca5a5",borderRadius:12,padding:"10px 14px",marginBottom:12}}>
                      <div style={{fontSize:12,color:"#dc2626",fontWeight:600}}>⚠️ Wants is only {Math.round(wants/e*100)}% at this income level — will feel very tight</div>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* Monthly breakdown table */}
            <div style={s.card()}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:14}}>📅 Monthly Milestone Load vs Savings Credit</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead>
                    <tr>
                      {["Month","Savings In","Milestone Due","Net W2","Wants"].map(h=>(
                        <th key={h} style={{background:"#1e293b",color:"#fff",padding:"8px 10px",textAlign:"right",fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {buildTimeline(d.milestones,d.months,d.wallet2Balance,scenarioIncome).map((t,i)=>{
                      const e=scenarioIncome;
                      const fixedNeeds=6100000; const buffer=Math.round(e*0.08);
                      const wants=Math.max(0,e-fixedNeeds-buffer-t.credit);
                      const tight=t.net<0;
                      return (
                        <tr key={i} style={{background:i%2===0?"#f8fafc":"#fff"}}>
                          <td style={{padding:"8px 10px",fontWeight:600,color:"#0f172a"}}>{MN(t.month)}</td>
                          <td style={{padding:"8px 10px",textAlign:"right",color:"#059669",fontWeight:600}}>+{fmtM(t.credit)}</td>
                          <td style={{padding:"8px 10px",textAlign:"right",color:t.due>0?"#b45309":"#94a3b8"}}>{t.due>0?`−${fmtM(t.due)}`:"-"}</td>
                          <td style={{padding:"8px 10px",textAlign:"right",fontWeight:700,color:tight?"#dc2626":"#059669"}}>{fmtM(t.net)}</td>
                          <td style={{padding:"8px 10px",textAlign:"right",color:"#6d28d9",fontWeight:600}}>{fmtM(wants)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div style={{fontSize:10,color:"#94a3b8",marginTop:8}}>Net W2 = savings in − milestone payments out. Red = savings being depleted that month.</div>
            </div>

            {/* Year total summary */}
            {(()=>{
              const e=scenarioIncome;
              const totalSavings=Math.round(e*0.40*10);
              const totalMilestones=d.milestones.reduce((s,m)=>s+m.installments.reduce((a,i)=>a+i.planned,0),0);
              const netW2YTD=totalSavings-totalMilestones;
              return (
                <div style={s.card({background:"#f8fafc",border:"1.5px solid #e2e8f0"})}>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>📊 Full Year Summary at {fmtM(e)}/month</div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <span style={{fontSize:12,color:"#64748b"}}>Total savings → W2 (10 months)</span>
                    <span style={{fontSize:13,fontWeight:700,color:"#059669"}}>+{fmtM(totalSavings)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <span style={{fontSize:12,color:"#64748b"}}>Total planned milestone payments</span>
                    <span style={{fontSize:13,fontWeight:700,color:"#b45309"}}>−{fmtM(totalMilestones)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:"1px solid #e2e8f0"}}>
                    <span style={{fontSize:12,fontWeight:700,color:"#0f172a"}}>Net W2 balance gain YTD</span>
                    <span style={{fontSize:16,fontWeight:900,color:netW2YTD>=0?"#059669":"#dc2626"}}>{netW2YTD>=0?"+":""}{fmtM(netW2YTD)}</span>
                  </div>
                  {netW2YTD<0&&<div style={{marginTop:8,fontSize:11,color:"#dc2626"}}>⚠️ At {fmtM(e)}/month, planned milestones exceed total savings for the year. Either increase income or reduce milestone scope.</div>}
                  {netW2YTD>=0&&<div style={{marginTop:8,fontSize:11,color:"#059669"}}>✅ At this income, savings covers all planned milestones with {fmtM(netW2YTD)} net positive.</div>}
                </div>
              );
            })()}
          </div>
        )}

        {tab==="joy"&&(
          <div>
            <div style={s.card()}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>⚖️ Should I spend this?</div>
              <div style={{fontSize:12,color:"#64748b",marginBottom:16}}>For any unplanned expense you're considering</div>
              <div style={{marginBottom:14}}><label style={s.lbl}>What is it?</label><input style={s.inp} type="text" value={joy.name} onChange={e=>setJoy({...joy,name:e.target.value})} placeholder="e.g. Makeup class 2M"/></div>
              <div style={{marginBottom:20}}><label style={s.lbl}>Amount (đ)</label><input style={s.inp} type="number" value={joy.amount||""} onChange={e=>setJoy({...joy,amount:Number(e.target.value)})} placeholder="0"/></div>
              <div style={{marginBottom:20}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><label style={{...s.lbl,marginBottom:0}}>Joy Score</label><span style={{fontSize:16,fontWeight:900,color:"#7c3aed"}}>{joy.jScore}/5</span></div>
                <input type="range" min={1} max={5} value={joy.jScore} onChange={e=>setJoy({...joy,jScore:Number(e.target.value)})} style={{width:"100%",accentColor:"#7c3aed"}}/>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#94a3b8",marginTop:3}}><span>Pure impulse</span><span>Deep value / growth</span></div>
              </div>
              <div style={{marginBottom:20}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><label style={{...s.lbl,marginBottom:0}}>Realistic Score</label><span style={{fontSize:16,fontWeight:900,color:"#3b82f6"}}>{joy.rScore}/5</span></div>
                <input type="range" min={1} max={5} value={joy.rScore} onChange={e=>setJoy({...joy,rScore:Number(e.target.value)})} style={{width:"100%",accentColor:"#3b82f6"}}/>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#94a3b8",marginTop:3}}><span>Budget is tight</span><span>Plenty of room</span></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
                {[{c:joy.jScore>=4&&joy.rScore>=4,i:"✅",t:"Go for it",d:"High joy + affordable",col:"#059669",bg:"#ecfdf5",bd:"#a7f3d0"},{c:joy.jScore<=3&&joy.rScore>=4,i:"❌",t:"Cut it",d:"Affordable but meh",col:"#dc2626",bg:"#fef2f2",bd:"#fca5a5"},{c:joy.jScore>=4&&joy.rScore<=3,i:"⚠️",t:"Think twice",d:"Joy high, budget tight",col:"#d97706",bg:"#fffbeb",bd:"#fde68a"},{c:joy.jScore<=3&&joy.rScore<=3,i:"🚫",t:"Skip it",d:"Not worth it or affordable",col:"#dc2626",bg:"#fef2f2",bd:"#fca5a5"}].map((cell,idx)=>(
                  <div key={idx} style={{background:cell.c?cell.bg:"#f8fafc",border:`1.5px solid ${cell.c?cell.bd:"#e2e8f0"}`,borderRadius:12,padding:"12px"}}>
                    <div style={{fontSize:18,marginBottom:4}}>{cell.i}</div>
                    <div style={{fontSize:12,fontWeight:700,color:cell.c?cell.col:"#94a3b8"}}>{cell.t}</div>
                    <div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>{cell.d}</div>
                  </div>
                ))}
              </div>
              {joy.name&&(()=>{const r=jR();return(<div style={{background:r.bg,border:`1.5px solid ${r.c}40`,borderRadius:14,padding:"16px"}}><div style={{fontSize:20,marginBottom:6}}>{r.icon}</div><div style={{fontSize:14,fontWeight:700,color:r.c,marginBottom:4}}>{r.label}</div><div style={{fontSize:11,color:"#64748b"}}>"{joy.name}"{joy.amount>0?` · ${fmtM(joy.amount)}`:""} — Joy {joy.jScore}/5 · Budget {joy.rScore}/5</div></div>);})()}
            </div>
          </div>
        )}

      </div>

      {/* ── MODALS ─────────────────────────────────────────────────────────── */}

      {/* Wallet 1 Add Transaction */}
      {showTx&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}} onClick={e=>{if(e.target===e.currentTarget)setShowTx(false);}}>
          <div style={{background:"#fff",borderRadius:"24px 24px 0 0",padding:"20px 20px 36px",width:"100%",maxWidth:480,boxShadow:"0 -4px 40px rgba(0,0,0,0.15)"}}>
            <div style={{width:36,height:4,background:"#e2e8f0",borderRadius:2,margin:"0 auto 20px"}}/>
            <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>Add Transaction — Wallet 1</div>
            <div style={{marginBottom:12}}><label style={s.lbl}>Amount (đ)</label><input style={s.inp} type="number" value={tx.amount} onChange={e=>setTx({...tx,amount:e.target.value})} autoFocus placeholder="Enter amount"/></div>
            <div style={{marginBottom:12}}><label style={s.lbl}>Bucket</label><select style={s.sel} value={tx.bucket} onChange={e=>setTx({...tx,bucket:e.target.value})}>{["Needs","Buffer","Wants"].map(b=><option key={b}>{b}</option>)}</select></div>
            <div style={{marginBottom:12}}><label style={s.lbl}>Description</label><input style={s.inp} type="text" value={tx.description} onChange={e=>setTx({...tx,description:e.target.value})} placeholder="e.g. Karaoke with friends"/></div>
            <div style={{marginBottom:20}}><label style={s.lbl}>Joy Score (optional, 1–5)</label><input style={s.inp} type="number" value={tx.joy} min={1} max={5} onChange={e=>setTx({...tx,joy:e.target.value})} placeholder="Leave blank"/></div>
            <div style={{display:"flex",gap:10}}><button style={{...s.btnG,flex:1}} onClick={()=>setShowTx(false)}>Cancel</button><button style={{...s.btnP,flex:2}} onClick={addTx}>Save</button></div>
          </div>
        </div>
      )}

      {/* Wallet 2 Log Payment */}
      {showW2&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}} onClick={e=>{if(e.target===e.currentTarget)setShowW2(false);}}>
          <div style={{background:"#fff",borderRadius:"24px 24px 0 0",padding:"20px 20px 36px",width:"100%",maxWidth:480,boxShadow:"0 -4px 40px rgba(0,0,0,0.15)"}}>
            <div style={{width:36,height:4,background:"#e2e8f0",borderRadius:2,margin:"0 auto 20px"}}/>
            <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>Log Wallet 2 Transaction</div>
            <div style={{marginBottom:12}}><label style={s.lbl}>Type</label><select style={s.sel} value={w2tx.type} onChange={e=>setW2tx({...w2tx,type:e.target.value})}><option value="payment">Milestone Payment (deduct)</option><option value="credit">Manual Credit (add)</option></select></div>
            {w2tx.type==="payment"&&<div style={{marginBottom:12}}><label style={s.lbl}>Milestone</label><select style={s.sel} value={w2tx.milestoneId} onChange={e=>setW2tx({...w2tx,milestoneId:e.target.value})}><option value="">— Select milestone —</option>{d.milestones.filter(m=>m.paid<m.yearlyBudget).map(m=><option key={m.id} value={m.id}>{m.name} ({fmtM(m.yearlyBudget-m.paid)} left)</option>)}</select></div>}
            <div style={{marginBottom:12}}><label style={s.lbl}>Amount (đ)</label><input style={s.inp} type="number" value={w2tx.amount} onChange={e=>setW2tx({...w2tx,amount:e.target.value})} autoFocus placeholder="0"/></div>
            {w2tx.amount>0&&w2tx.type==="payment"&&<div style={{marginBottom:12,fontSize:12,color:"#b45309"}}>Wallet 2 after: {fmtM(d.wallet2Balance-Number(w2tx.amount))}</div>}
            <div style={{marginBottom:20}}><label style={s.lbl}>Note</label><input style={s.inp} type="text" value={w2tx.note} onChange={e=>setW2tx({...w2tx,note:e.target.value})} placeholder="e.g. B1 deposit March"/></div>
            <div style={{display:"flex",gap:10}}><button style={{...s.btnG,flex:1}} onClick={()=>setShowW2(false)}>Cancel</button><button style={{...s.btnGr,flex:2}} onClick={addW2Tx}>Save</button></div>
          </div>
        </div>
      )}

      {/* Transfer surplus */}
      {showTransfer&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.5)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:200}} onClick={e=>{if(e.target===e.currentTarget)setShowTransfer(false);}}>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:20,padding:24,width:"100%",maxWidth:380,boxShadow:"0 8px 40px rgba(0,0,0,0.12)"}}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>→ Transfer Surplus to Wallet 2</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:16}}>Leftover from Buffer or Wants this month</div>
            <label style={s.lbl}>Amount (đ)</label>
            <input style={{...s.inp,marginBottom:8}} type="number" value={transferAmt} onChange={e=>setTransferAmt(e.target.value)} autoFocus placeholder="0"/>
            {transferAmt>0&&<div style={{fontSize:12,color:"#059669",marginBottom:16}}>Wallet 2 after: {fmtM(d.wallet2Balance+Number(transferAmt))}</div>}
            <div style={{display:"flex",gap:10}}><button style={{...s.btnG,flex:1}} onClick={()=>setShowTransfer(false)}>Cancel</button><button style={{...s.btnGr,flex:2}} onClick={doTransfer}>Transfer</button></div>
          </div>
        </div>
      )}

      {/* Reset month */}
      {showReset&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.5)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:200}} onClick={e=>{if(e.target===e.currentTarget)setShowReset(false);}}>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:20,padding:24,width:"100%",maxWidth:380,boxShadow:"0 8px 40px rgba(0,0,0,0.12)"}}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>🗑 Reset Month</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:16}}>Data will be archived, not deleted. Savings credit will be reversed.</div>
            <label style={s.lbl}>Select month to reset</label>
            <select style={{...s.sel,marginBottom:16}} value={resetMonth} onChange={e=>setResetMonth(e.target.value)}>
              {Object.keys(d.months).filter(m=>!m.includes("archived")).map(m=><option key={m} value={m}>{MN_FULL(m)}</option>)}
            </select>
            <div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:10,padding:"10px 12px",marginBottom:16}}>
              <div style={{fontSize:12,color:"#dc2626"}}>This will archive {MN_FULL(resetMonth)} and reverse the savings credit of {fmtM(d.months[resetMonth]?.allocation?.savings||0)}.</div>
            </div>
            <div style={{display:"flex",gap:10}}><button style={{...s.btnG,flex:1}} onClick={()=>setShowReset(false)}>Cancel</button><button style={{flex:2,background:"#dc2626",color:"#fff",border:"none",borderRadius:12,padding:"13px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}} onClick={doReset}>Archive & Reset</button></div>
          </div>
        </div>
      )}

      {/* Milestone quick pay */}
      {mModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.5)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:200}} onClick={e=>{if(e.target===e.currentTarget)setMModal(null);}}>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:20,padding:24,width:"100%",maxWidth:380,boxShadow:"0 8px 40px rgba(0,0,0,0.12)"}}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>Pay: {mModal.name}</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>{fmtM(mModal.paid)} / {fmtM(mModal.yearlyBudget)}</div>
            <Bar value={mModal.paid} max={mModal.yearlyBudget} color="#7c3aed"/>
            <div style={{fontSize:11,color:"#94a3b8",marginBottom:16,marginTop:6}}>Deducted from Wallet 2 balance</div>
            <label style={s.lbl}>Amount (đ)</label>
            <input style={{...s.inp,marginBottom:8}} type="number" value={mPay} onChange={e=>setMPay(e.target.value)} autoFocus placeholder="0"/>
            {mPay>0&&<div style={{fontSize:12,color:"#7c3aed",marginBottom:16}}>Wallet 2 after: {fmtM(d.wallet2Balance-Number(mPay))}</div>}
            <div style={{display:"flex",gap:10}}><button style={{...s.btnG,flex:1}} onClick={()=>setMModal(null)}>Cancel</button><button style={{...s.btnGr,flex:2}} onClick={payMilestone}>Confirm</button></div>
          </div>
        </div>
      )}

      {/* Bottom Nav */}
      <div style={s.nav}>
        {[{k:"home",i:"🏠",l:"Home"},{k:"wallet1",i:"👛",l:"W1"},{k:"setup",i:"➕",l:"Setup"},{k:"wallet2",i:"💎",l:"W2"},{k:"weekly",i:"📆",l:"Weekly"},{k:"scenario",i:"📊",l:"Scenario"},{k:"roadmap",i:"🗓",l:"Goals"},{k:"joy",i:"⚖️",l:"Joy"}].map(t=>(
          <button key={t.k} style={s.nb(tab===t.k)} onClick={()=>{setTab(t.k);if(t.k==="setup")setStep(1);}}>
            <span style={{fontSize:18,lineHeight:1}}>{t.i}</span>
            <span style={{fontSize:8,fontWeight:600}}>{t.l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MoneyOS />);
  </script>

  <!-- Service Worker for offline -->
  <script>
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'moneyos-v1';
        const URLS = [location.href];
        self.addEventListener('install', e => e.waitUntil(
          caches.open(CACHE).then(c => c.addAll(URLS))
        ));
        self.addEventListener('fetch', e => e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match(e.request)))
        ));
      `;
      const blob = new Blob([swCode], {type: 'application/javascript'});
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    }
  </script>
